name: Test aoe4world fetch
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch summary
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -H "User-Agent: aoe4-analyzer/1.0" \
            "https://aoe4world.com/players/16794502/games/231364125/summary?camelize=true"